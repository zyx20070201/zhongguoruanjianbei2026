services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: pp1-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  bge-m3-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: pp1-bge-m3-embedding
    command:
      - --model-id
      - BAAI/bge-m3
      - --port
      - "80"
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - hf_cache:/data

  bge-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: pp1-bge-reranker
    command:
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --port
      - "80"
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - hf_cache:/data

volumes:
  qdrant_storage:
  hf_cache:
